[project]
name = "arachne-messaging"
version = "0.1.0"
description = "Redpanda (Kafka-compatible) producer/consumer wrappers with Pydantic serialization"
requires-python = ">=3.13"
dependencies = [
    "confluent-kafka>=2.6,<3",
    "pydantic>=2.10,<3",
    "arachne-models",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/arachne_messaging"]

[tool.ruff]
target-version = "py313"
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM", "TCH"]

[tool.pytest.ini_options]
testpaths = ["tests"]
