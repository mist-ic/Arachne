[project]
name = "arachne-storage"
version = "0.1.0"
description = "MinIO (S3-compatible) client wrapper implementing the Claim-Check pattern"
requires-python = ">=3.13"
dependencies = [
    "minio>=7.2,<8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/arachne_storage"]

[tool.ruff]
target-version = "py313"
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM", "TCH"]

[tool.pytest.ini_options]
testpaths = ["tests"]
