[project]
name = "arachne-extraction"
version = "0.1.0"
description = "AI-first extraction engine — HTML preprocessing, LLM extraction, multi-model routing, auto-schema discovery, CAPTCHA solving"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.10,<3",
    "pydantic-settings>=2.7,<3",
    "structlog>=24.4,<25",
    "lxml>=5.3,<6",
    "cssselect>=1.2,<2",
    "markdownify>=0.14,<1",
    "trafilatura>=2.0,<3",
    "instructor>=1.7,<2",
    "litellm>=1.55,<2",
    "tiktoken>=0.8,<1",
    "rank-bm25>=0.2,<1",
]

[project.optional-dependencies]
vision = [
    "ollama>=0.4,<1",
    "Pillow>=11,<12",
]
captcha = [
    "2captcha-python>=1.5,<2",
]
dev = [
    "pytest>=8,<9",
    "pytest-asyncio>=0.24,<1",
    "pytest-cov>=6,<7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/arachne_extraction"]

[tool.ruff]
target-version = "py313"
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM", "TCH"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
