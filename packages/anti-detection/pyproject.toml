[project]
name = "arachne-stealth"
version = "0.1.0"
description = "Anti-detection engine — TLS spoofing, stealth browsers, evasion routing, proxy orchestration"
requires-python = ">=3.12"
dependencies = [
    "curl_cffi>=0.7,<1",
    "pydantic>=2.10,<3",
    "pydantic-settings>=2.7,<3",
    "structlog>=24.4,<25",
]

[project.optional-dependencies]
browsers = [
    "camoufox>=0.4",
    "browserforge>=1.2",
    "pydoll>=1.5",
]
dev = [
    "pytest>=8,<9",
    "pytest-asyncio>=0.24,<1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/arachne_stealth"]

[tool.ruff]
target-version = "py313"
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM", "TCH"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
