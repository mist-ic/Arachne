# =============================================================================
# Arachne — Dev Overlay
# =============================================================================
# Usage: docker compose -f infra/docker-compose.yml -f infra/docker-compose.dev.yml up -d
#
# Additions over base:
#   - Debug logging on all services
#   - Exposed debug ports
#   - Source code mounts for hot-reload (when running apps in containers)
# =============================================================================

services:

  # Override Redpanda with verbose logging
  redpanda:
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --advertise-schema-registry-addr internal://redpanda:8081,external://localhost:18081
      - --default-log-level=debug

  # Override PostgreSQL with query logging
  postgres:
    command: [ "postgres", "-c", "log_statement=all", "-c", "log_min_duration_statement=0" ]

  postgres-temporal:
    command: [ "postgres", "-c", "log_statement=all" ]
