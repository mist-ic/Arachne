# =============================================================================
# OpenTelemetry Collector Configuration for Arachne ClickStack
# =============================================================================
# Receives OTLP data from all Arachne services and routes to:
#   - ClickHouse: traces, metrics, logs (primary storage)
#   - HyperDX: unified observability UI
#
# Architecture:
#   [Services] → OTLP gRPC/HTTP → [OTel Collector] → [ClickHouse]
#                                                    → [HyperDX]
# =============================================================================

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:
    send_batch_size: 10000
    timeout: 5s
    send_batch_max_size: 11000

  memory_limiter:
    check_interval: 5s
    limit_mib: 512
    spike_limit_mib: 128

  # Add Arachne-specific resource attributes
  resource:
    attributes:
      - key: service.namespace
        value: "arachne"
        action: upsert
      - key: deployment.environment
        value: "development"
        action: upsert

exporters:
  # ClickHouse — primary storage for traces, metrics, logs
  clickhouse:
    endpoint: "tcp://clickhouse:9000?dial_timeout=10s&compress=lz4"
    database: arachne_telemetry
    ttl: 72h
    create_schema: true
    logs_table_name: otel_logs
    traces_table_name: otel_traces
    metrics_table_name: otel_metrics
    timeout: 10s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  # OTLP exporter for HyperDX
  otlp/hyperdx:
    endpoint: "http://hyperdx:4318"
    tls:
      insecure: true

  # Debug exporter for development
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"

  zpages:
    endpoint: "0.0.0.0:55679"

service:
  extensions: [health_check, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [clickhouse, otlp/hyperdx, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [clickhouse, otlp/hyperdx, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [clickhouse, otlp/hyperdx, debug]

  telemetry:
    logs:
      level: info
    metrics:
      address: "0.0.0.0:8888"
